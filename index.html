<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KENJAGAMES // eBay Seller Finder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #ffffff; font-family: 'Courier New', monospace; }
    header { padding: 20px 40px; border-bottom: 1px solid #333; }
    header h1 { color: #ff2d6b; font-size: 20px; letter-spacing: 2px; }
    header p { color: #888; font-size: 12px; margin-top: 4px; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    .card { background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; padding: 30px; margin-bottom: 20px; }
    .card h2 { color: #00ff88; font-size: 13px; letter-spacing: 3px; margin-bottom: 20px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 11px; color: #888; letter-spacing: 1px; }
    .form-group input { background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 13px; }
    .form-group input:focus { outline: none; border-color: #00ff88; }
    .markets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .market-btn { background: #0a0a0a; border: 1px solid #333; color: #888; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: 'Courier New', monospace; transition: all 0.2s; }
    .market-btn.active { background: #00ff88; border-color: #00ff88; color: #000; font-weight: bold; }
    .search-btn { width: 100%; margin-top: 20px; background: #ff2d6b; border: none; color: #fff; padding: 14px; border-radius: 4px; font-size: 14px; letter-spacing: 2px; cursor: pointer; font-family: 'Courier New', monospace; transition: background 0.2s; }
    .search-btn:hover { background: #e0255f; }
    .search-btn:disabled { background: #444; cursor: not-allowed; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .results-header span { color: #888; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { color: #00ff88; text-align: left; padding: 10px 12px; border-bottom: 1px solid #2a2a2a; font-size: 11px; letter-spacing: 1px; }
    td { padding: 12px; border-bottom: 1px solid #1a1a1a; color: #ccc; }
    tr:hover td { background: #1a1a1a; }
    td a { color: #00ff88; text-decoration: none; }
    td a:hover { text-decoration: underline; }
    .status { text-align: center; padding: 40px; color: #888; font-size: 13px; }
    .flag { font-size: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>KENJAGAMES // eBay Seller Finder</h1>
    <p>жҪңеңЁеҸ–еј•е…ҲгӮ»гғ©гғјзҷәжҺҳгғ„гғјгғ«</p>
  </header>

  <div class="container">
    <div class="card">
      <h2>в–ё SEARCH CONFIG</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>KEYWORD</label>
          <input type="text" id="keyword" placeholder="дҫӢ: Game Boy, 3DS, PSP" value="Game Boy">
        </div>
        <div class="form-group">
          <label>MIN FEEDBACK</label>
          <input type="number" id="minFeedback" placeholder="дҫӢ: 500" value="500">
        </div>
        <div class="form-group">
          <label>MAX RESULTS</label>
          <input type="number" id="itemsPerPage" placeholder="дҫӢ: 100" value="100">
        </div>
      </div>
      <div style="margin-top:16px;">
        <label style="font-size:11px; color:#888; letter-spacing:1px;">MARKETS</label>
        <div class="markets" id="markets">
          <button class="market-btn active" data-id="EBAY-US">рҹҮәрҹҮё US</button>
          <button class="market-btn active" data-id="EBAY-GB">рҹҮ¬рҹҮ§ UK</button>
          <button class="market-btn active" data-id="EBAY-AU">рҹҮҰрҹҮә AU</button>
          <button class="market-btn active" data-id="EBAY-DE">рҹҮ©рҹҮӘ DE</button>
          <button class="market-btn active" data-id="EBAY-FR">рҹҮ«рҹҮ· FR</button>
          <button class="market-btn active" data-id="EBAY-CA">рҹҮЁрҹҮҰ CA</button>
        </div>
      </div>
      <button class="search-btn" id="searchBtn" onclick="startSearch()">рҹ”Қ SEARCH SELLERS</button>
    </div>

    <div class="card" id="resultsCard" style="display:none;">
      <div class="results-header">
        <h2>в–ё RESULTS</h2>
        <span id="resultCount"></span>
      </div>
      <div id="resultsBody"></div>
    </div>
  </div>

  <script>
    const countryFlags = {
      'US': 'рҹҮәрҹҮё', 'GB': 'рҹҮ¬рҹҮ§', 'AU': 'рҹҮҰрҹҮә', 'DE': 'рҹҮ©рҹҮӘ',
      'FR': 'рҹҮ«рҹҮ·', 'CA': 'рҹҮЁрҹҮҰ', 'JP': 'рҹҮҜрҹҮө', 'CN': 'рҹҮЁрҹҮі',
      'IT': 'рҹҮ®рҹҮ№', 'ES': 'рҹҮӘрҹҮё', 'NL': 'рҹҮірҹҮұ', 'HK': 'рҹҮӯрҹҮ°',
    };

    document.querySelectorAll('.market-btn').forEach(btn => {
      btn.addEventListener('click', () => btn.classList.toggle('active'));
    });

    async function startSearch() {
      const keyword = document.getElementById('keyword').value.trim();
      const minFeedback = document.getElementById('minFeedback').value || 0;
      const itemsPerPage = document.getElementById('itemsPerPage').value || 50;
      const activeMarkets = [...document.querySelectorAll('.market-btn.active')].map(b => b.dataset.id);

      if (!keyword) { alert('гӮӯгғјгғҜгғјгғүгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }
      if (activeMarkets.length === 0) { alert('гғһгғјгӮұгғғгғҲгӮ’1гҒӨд»ҘдёҠйҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }

      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      btn.textContent = 'вҸі SEARCHING...';

      const resultsCard = document.getElementById('resultsCard');
      const resultsBody = document.getElementById('resultsBody');
      resultsCard.style.display = 'block';
      resultsBody.innerHTML = '<div class="status">жӨңзҙўдёӯ...</div>';

      const allSellers = {};

      for (const market of activeMarkets) {
        try {
          const res = await fetch(`/api/search?keyword=${encodeURIComponent(keyword)}&globalId=${market}&itemsPerPage=${itemsPerPage}&minFeedback=${minFeedback}`);
          const data = await res.json();
          if (data.sellers) {
            for (const seller of data.sellers) {
              const key = `${seller.username}_${market}`;
              allSellers[key] = { ...seller, market };
            }
          }
        } catch (e) {
          console.error(`Error for ${market}:`, e);
        }
      }

      const sellers = Object.values(allSellers).sort((a, b) => b.feedbackScore - a.feedbackScore);

      document.getElementById('resultCount').textContent = `${sellers.length} sellers found`;

      if (sellers.length === 0) {
        resultsBody.innerHTML = '<div class="status">жқЎд»¶гҒ«еҗҲгҒҶгӮ»гғ©гғјгҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹ</div>';
      } else {
        resultsBody.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>SELLER</th>
                <th>MARKET</th>
                <th>SHIP FROM</th>
                <th>FEEDBACK</th>
                <th>RATING</th>
                <th>ITEMS</th>
              </tr>
            </thead>
            <tbody>
              ${sellers.map(s => {
                const flag = countryFlags[s.shipFrom] || 'рҹҢҗ';
                return `
                <tr>
                  <td><a href="https://www.ebay.com/usr/${s.username}" target="_blank">${s.username}</a></td>
                  <td>${s.market}</td>
                  <td>${flag} ${s.shipFrom}</td>
                  <td>${s.feedbackScore.toLocaleString()}</td>
                  <td>${s.feedbackPercentage}%</td>
                  <td>${s.itemCount}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`;
      }

      btn.disabled = false;
      btn.textContent = 'рҹ”Қ SEARCH SELLERS';
    }
  </script>
</body>
</html>
