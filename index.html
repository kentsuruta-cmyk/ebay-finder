<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KENJAGAMES // eBay Seller Finder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #ffffff; font-family: 'Courier New', monospace; }
    header { padding: 20px 40px; border-bottom: 1px solid #333; }
    header h1 { color: #ff2d6b; font-size: 20px; letter-spacing: 2px; }
    header p { color: #888; font-size: 12px; margin-top: 4px; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    .card { background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; padding: 30px; margin-bottom: 20px; }
    .card h2 { color: #00ff88; font-size: 13px; letter-spacing: 3px; margin-bottom: 20px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 11px; color: #888; letter-spacing: 1px; }
    .form-group input { background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 13px; }
    .form-group input:focus { outline: none; border-color: #00ff88; }
    .markets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .market-btn { background: #0a0a0a; border: 1px solid #333; color: #888; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: 'Courier New', monospace; transition: all 0.2s; }
    .market-btn.active { background: #00ff88; border-color: #00ff88; color: #000; font-weight: bold; }
    .search-btn { width: 100%; margin-top: 20px; background: #ff2d6b; border: none; color: #fff; padding: 14px; border-radius: 4px; font-size: 14px; letter-spacing: 2px; cursor: pointer; font-family: 'Courier New', monospace; transition: background 0.2s; }
    .search-btn:hover { background: #e0255f; }
    .search-btn:disabled { background: #444; cursor: not-allowed; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .results-header span { color: #888; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { color: #00ff88; text-align: left; padding: 10px 12px; border-bottom: 1px solid #2a2a2a; font-size: 11px; letter-spacing: 1px; }
    td { padding: 12px; border-bottom: 1px solid #1a1a1a; color: #ccc; }
    tr:hover td { background: #1a1a1a; }
    td a { color: #00ff88; text-decoration: none; }
    td a:hover { text-decoration: underline; }
    .status { text-align: center; padding: 40px; color: #888; font-size: 13px; }
    .flag { font-size: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>KENJAGAMES // eBay Seller Finder</h1>
    <p>潜在取引先セラー発掘ツール</p>
  </header>

  <div class="container">
    <div class="card">
      <h2>▸ SEARCH CONFIG</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>KEYWORD</label>
          <input type="text" id="keyword" placeholder="例: Game Boy, 3DS, PSP" value="Game Boy">
        </div>
        <div class="form-group">
